# config.yaml
# Resolution order (all scripts):
# 1) config class defaults in code
# 2) values in this yaml
# 3) CLI --set KEY=VALUE overrides

experiment_name: "geo_aligner_mp16_swin"
output_dir: "./checkpoints/"
device: "cuda"

data:
  batch_size: 256
  num_workers: 16
  img_size: 224

  train:
    csv_file: "/data/lsy/datas/MP16-Pro/metadata/MP16_Pro_filtered.csv"
    img_dir: "/data/lsy/datas/MP16-Pro/images"

  val:
    csv_file: "/data/lsy/datas/yfcc26k/metadata/yfcc25600_places365.csv"
    img_dir: "/data/lsy/datas/yfcc26k/images"

  test:
    csv_file: "/data/lsy/datas/im2gps3k/metadata/im2gps3k_places365.csv"
    img_dir: "/data/lsy/datas/im2gps3k/images"

model:
  image:
    vit_name: "openai/clip-vit-large-patch14"
    freeze_backbone: true
    use_landmark: false

  gps:
    fourier_n_freqs: 16
    base_scale_multiplier: 1.0

  alignment:
    geo_scorer: "hybrid"
    loss_weight_g: 1.2

train:
  epochs: 50
  learning_rate: 5e-5
  weight_decay: 0.05
  lr_scheduler: "cosine"
  lr_mult_image: 0.1
  lr_mult_gps: 1.0
  lr_mult_align: 1.0
  lr_mult_logit_scale: 0.01
  use_ema: true
  ema_decay: 0.999
  warmup_epochs: 1
  log_interval: 100
  save_interval: 1
  resume_path: null
